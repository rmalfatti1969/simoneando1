
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deixe sua avaliação no Google - Simone Ando</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f5e2 0%, #f0ede4 100%);
    font-family: 'Lato', sans-serif;
    padding: 20px;
  }

  .card {
    width: 420px;
    background: linear-gradient(160deg, #faf7f0 0%, #eef5e8 60%, #dde8d5 100%);
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    padding: 28px 24px 24px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
  }

  /* Folha decorativa SVG */
  .deco-leaf {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 100px;
    opacity: 0.5;
    pointer-events: none;
  }
  .deco-leaf-bl {
    position: absolute;
    bottom: 80px;
    left: -10px;
    width: 55px;
    opacity: 0.25;
    pointer-events: none;
    transform: rotate(30deg) scaleX(-1);
  }

  /* Título */
  .title-top {
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: 30px;
    color: #2d6a35;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .google-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 4px;
  }

  .google-line .prefix {
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: #2d6a35;
  }

  .google-logo {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }

  .g-G { color: #4285F4; }
  .g-o1 { color: #DB4437; }
  .g-o2 { color: #F4B400; }
  .g-g  { color: #4285F4; }
  .g-l  { color: #0F9D58; }
  .g-e  { color: #DB4437; }
  .g-ex { color: #F4B400; font-family: 'Dancing Script', cursive; font-size: 28px; }

  .sparkles {
    color: #d4a017;
    font-size: 14px;
    letter-spacing: 2px;
  }

  .underline-bar {
    width: 140px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4a017 30%, #d4a017 70%, transparent);
    margin: 2px auto 16px;
    border-radius: 2px;
  }

  /* Conteúdo central */
  .content-area {
    display: flex;
    gap: 14px;
    align-items: stretch;
    margin-bottom: 18px;
  }

  /* Foto */
  .photo-side {
    flex: 1;
    min-width: 0;
  }

  .photo-wrapper {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    border: 2px solid rgba(255,255,255,0.7);
  }

  .photo-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* Celular */
  .phone-side {
    width: 148px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .phone-mockup {
    background: #1c1c1e;
    border-radius: 20px;
    padding: 10px 7px 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    position: relative;
  }

  .phone-notch {
    width: 50px;
    height: 6px;
    background: #2c2c2e;
    border-radius: 3px;
    margin: 0 auto 8px;
  }

  .phone-screen {
    background: #fff;
    border-radius: 12px;
    padding: 10px 9px;
    font-size: 10px;
  }

  .phone-search-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    padding: 4px 8px;
    margin-bottom: 8px;
    font-size: 8.5px;
    color: #666;
    background: #f8f8f8;
  }

  .phone-stars {
    display: flex;
    gap: 2px;
    margin-bottom: 7px;
  }

  .phone-star {
    color: #F4B400;
    font-size: 18px;
    line-height: 1;
  }

  .phone-input-box {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 8.5px;
    color: #aaa;
    width: 100%;
    margin-bottom: 7px;
    background: #fafafa;
    min-height: 32px;
  }

  .phone-btn {
    background: #4285F4;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 9px;
    width: 100%;
    text-align: center;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Botão CTA */
  .cta-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #2d6a35 0%, #1e4d25 100%);
    color: white;
    text-align: center;
    font-family: 'Lato', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 15px 24px;
    border-radius: 50px;
    text-decoration: none;
    margin-bottom: 12px;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 4px 18px rgba(45,106,53,0.38);
    letter-spacing: 0.3px;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(45,106,53,0.48);
  }

  .cta-btn:active {
    transform: translateY(0);
  }

  /* Tagline */
  .tagline {
    text-align: center;
    font-family: 'Dancing Script', cursive;
    color: #7a4a2a;
    font-size: 20px;
    line-height: 1.3;
  }
</style>
</head>
<body>
<div class="card">

  <!-- Folhas SVG decorativas -->
  <svg class="deco-leaf" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
    <path d="M95 0 Q118 38 78 76 Q58 96 38 118 Q18 138 0 150 Q28 132 48 104 Q68 76 82 48 Q96 20 95 0Z" fill="#4a8a3a"/>

  <!-- Título -->

      <span class="g-G">G</span><span class="g-o1">o</span><span class="g-o2">o</span><span class="g-g">g</span><span class="g-l">l</span><span class="g-e">e</span>

  <div class="content-area">

    <div class="phone-side">

        <div class="phone-screen">
          <div class="phone-search-bar">
            <span>🔍</span>

          <div class="phone-stars">

          <div class="phone-input-box">Escreva um comentário...</div>
          <div class="phone-btn">Publicar</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Botão WhatsApp -->
  <a class="cta-btn"
     href="https://wa.me/5511983610756?text=Ol%C3%A1!%20%F0%9F%8C%BF%0AEspero%20que%20voc%C3%AA%20esteja%20se%20sentindo%20bem%2C%20em%20paz%20e%20com%20as%20energias%20renovadas.%20%0AEstou%20passando%20para%20fazer%20um%20pedido%20muito%20importante%20para%20mim%3A%20se%20voc%C3%AA%20gostou%20do%20seu%20atendimento%20e%20dos%20resultados%2C%20poderia%20tirar%20apenas%20um%20minutinho%20para%20me%20avaliar%20no%20Google%3F%20%E2%AD%90%E2%AD%90%E2%AD%90%E2%AD%90%E2%AD%90%0AIss%20me%20ajuda%20muito%20a%20crescer%20e%20permite%20que%20outras%20pessoas%20tamb%C3%A9m%20encontrem%20o%20seu%20caminho%20para%20o%20equil%C3%ADbrio%20e%20bem-estar.%0A%C3%89%20bem%20rapidinho%2C%20basta%20clicar%20no%20link%3A%20%F0%9F%91%89%20https%3A%2F%2Ftinyurl.com%2Fsimoneando%0AAgrade%C3%A7o%20de%20cora%C3%A7%C3%A3o%20pela%20confian%C3%A7a%20no%20meu%20trabalho.%20%0AQualquer%20d%C3%BAvida%20ou%20se%20quiser%20agendar%20a%20pr%C3%B3xima%20sess%C3%A3o%2C%20%C3%A9%20s%C3%B3%20me%20chamar!%0ACom%20carinho%2C%20Simone%20Ando%20%E2%9C%A8"
     target="_blank">
    Deixe sua avaliação
  </a>

  <div class="tagline">É rápido e fácil! ♥ ✦</div>

</div>
</body>
</html>
